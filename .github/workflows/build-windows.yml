name: Build Windows App

on:
  push:
    branches: [main]
  workflow_dispatch:        # lets you run it manually from the Actions tab

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build the app (PyInstaller)
        run: pyinstaller passport_cropper.spec

      - name: Build the installer (Inno Setup)
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { choco install innosetup --no-progress -y }
          & $iscc "installer\GowriStudio.iss"

      - name: Upload installer (.exe)
        uses: actions/upload-artifact@v4
        with:
          name: Gowri-Studio-Windows-Installer
          path: installer/Output/GowriStudioSetup.exe
          if-no-files-found: error

      - name: Upload portable app (folder)
        uses: actions/upload-artifact@v4
        with:
          name: Gowri-Studio-Windows-Portable
          path: 'dist/Gowri Studio/'
          if-no-files-found: error
